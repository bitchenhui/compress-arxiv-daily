# eess.IV 每日论文抓取配置
show_badge: True
max_results: 300        # eess.IV 日均 80~150 条新论文，300 留余量
min_citations: 200      # 历史论文最低引用数
history_date_from: "20200101"
history_date_to: ""

publish_readme: True

# 文件路径
json_readme_path: "./docs/eess-iv-daily.json"
md_readme_path: "README.md"
json_history_path: "./docs/eess-iv-history.json"

# 飞书 webhook（可选，留空则在 workflow 中通过 secret 注入）
feishu_webhook: ""

# arxiv 抓取目标类目
arxiv_category: "eess.IV"

# 医学论文过滤词（命中任一即丢弃）
medical_exclude_keywords:
  - medical
  - clinical
  - mri
  - ct scan
  - ultrasound
  - x-ray
  - xray
  - radiograph
  - radiography
  - patient
  - hospital
  - disease
  - diagnosis
  - diagnostic
  - tumor
  - tumour
  - lesion
  - biomedical
  - anatomical
  - pathology
  - histopathology
  - endoscope
  - endoscopic
  - surgical
  - cardiology
  - ophthalmology
  - retinal
  - brain tumor
  - covid
  - pneumonia

# 翻译配置（MyMemory 免费 API，en -> zh-CN）
translation:
  enabled: True
  provider: "mymemory"
  endpoint: "https://api.mymemory.translated.net/get"
  langpair: "en|zh-CN"
  timeout_sec: 5
  max_input_chars: 500          # 超长摘要截断到该长度再翻译
  max_translate_per_day: 10     # 每日翻译数量上限（避免 MyMemory 5000 字/天 限额）
  retry: 2
  fallback_to_english: True     # 失败时是否回退到英文

# GitHub 链接抽取
github:
  # 匹配 http(s)://github.com/<owner>/<repo>[/path]
  regex: 'https?://github\.com/[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+(?:/[A-Za-z0-9_./-]*)?'
  # 链接尾部常被粘上的标点
  strip_trailing: '.,;:!?)>]\"'

# 邮件发送配置（实际凭据在 GitHub Secrets 中）
email:
  enabled: True
  smtp_server: "smtp.163.com"
  smtp_port: 465
  use_ssl: True
  sender: "13261281092@163.com"
  recipients:
    - "13261281092@163.com"
    - "duanchenhui.zoro@jd.com"
  subject_prefix: "[eess.IV Daily]"
  include_english_summary: True
