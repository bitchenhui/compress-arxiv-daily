# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "bitchenhui"
repo_name: "compress-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 5

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/compress-arxiv-daily.json'
json_gitpage_path: './docs/compress-arxiv-daily-web.json'
json_wechat_path: './docs/compress-arxiv-daily-wechat.json'
json_history_path: './docs/compress-arxiv-history.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# Feishu webhook (optional) - 请替换为你的飞书机器人webhook地址
feishu_webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# keywords to search
keywords:
    "Video Codec":
        filters: ["H.264", "AVC", "MPEG-4 Part 10", "H.265", "HEVC","H.266", "VVC", "MPEG-I Part 3", "JVET", "VTM", "AV1", "AOMedia Video 1", "AVS", "AVS2", "AVS3", "China AVS", "inter prediction", "intra prediction", "motion estimation", "mode decision", "DCT", "integer transform", "DST", "transform skip", "CABAC", "CAVLC", "arithmetic coding", "context modeling", "deblocking filter", "SAO", "ALF", "sample adaptive offset", "rate distortion optimization", "RDOQ", "λ optimization", "rate control", "bit allocation", "R-λ model", "R-Q model", "low bitrate coding", "ultra low bitrate", "screen content coding", "SCC", "mixed content", "text coding",  "SVC", "scalable video coding", "temporal scalability", "spatial scalability"]
    "Neural Compression": 
        filters: ["neural video codec", "deep learning video coding", "AI video codec", "CNN-based video coding", "convolutional neural network video", "RNN video coding", "LSTM video", "generative video coding", "video prediction coding", "end-to-end image coding", "learned image compression", "neural image codec", "end-to-end video coding", "deep video compression", "neural video", "Deep Contextual Video Compression"]
    "MLLM":
        filters: ["LLM Video Coding", "Semantic Video Coding", "Semantic Communication", "Diffusion Video Coding", "large model video compression", "transformer video codec", "multimodal video coding", "generative video compression"]
    "Video Quality":
        filters: ["video quality assessment", "SSIM", "VMAF", "PSNR", "perceptual quality", "VQA", "IQA"]
    "3D Compression":
        filters: ["MVC", "multi-view video coding", "MVD", "multiview plus depth", "3D video coding", "stereoscopic video", "auto-stereoscopic", "VR video coding", "360 video", "omnidirectional video", "spherical video", "point cloud coding", "V-PCC", "G-PCC", "geometry coding", "panoramic video", "equirectangular", "cubemap", "VR streaming", "spherical video coding", "tile-based streaming", "viewport-adaptive", "Gaussian splatting", "3D Gaussian", "dynamic Gaussians", "mesh coding", "3D mesh", "progressive mesh"]
