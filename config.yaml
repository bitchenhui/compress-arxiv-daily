# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "bitchenhui"
repo_name: "compress-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10000
min_citations: 200  # Minimum citations for history papers (0 = no filter)
history_date_from: "20250101"  # Start date for history search in YYYYMMDD format (e.g., 20100101)
history_date_to: "20250701"    # End date for history search in YYYYMMDD format (e.g., 20111231). If empty, searches to present

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/compress-arxiv-daily.json'
json_gitpage_path: './docs/compress-arxiv-daily-web.json'
json_wechat_path: './docs/compress-arxiv-daily-wechat.json'
json_history_path: './docs/compress-arxiv-history.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# Feishu webhook (optional) - 请替换为你的飞书机器人webhook地址
feishu_webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/82390df1-c0fc-4b38-840f-792abe38baf6"

# keywords to search
keywords:
    "Video Codec":
        filters: ["H.265", "HEVC","H.266", "VVC", "video codec",  "inter", "intra"]
    "Neural Compression": 
        filters: ["neural video codec", "deep learning video coding", "AI video codec", "CNN-based video coding", "RNN video coding", "generative video coding", "end-to-end image coding", "learned image compression", "neural image codec", "end-to-end video coding", "deep video compression", "neural video", "Deep Contextual Video Compression"]
    "MLLM":
        filters: ["LLM Video Coding", "Semantic Video Coding","Diffusion Video Coding", "large model video compression", "transformer video codec", "multimodal video coding", "generative video compression"]
    "Video Quality":
        filters: ["video quality assessment", "VQA", "IQA"]
    "3D Compression":
        filters: ["MVC", "multi-view video coding", "3D video coding", "VR video coding", "point cloud coding", "spherical video coding"]
