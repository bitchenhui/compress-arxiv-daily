# GitHub Action for running history papers update (manual trigger only)

name: Update History Papers

on:
  workflow_dispatch:
    inputs:
      history_date_from:
        description: 'Start date (YYYYMMDD)'
        required: true
        default: '20250101'
      history_date_to:
        description: 'End date (YYYYMMDD)'
        required: true
        default: '20250701'
      min_citations:
        description: 'Minimum citations'
        required: true
        default: '200'

env:
  GITHUB_USER_NAME: bitchenhui
  GITHUB_USER_EMAIL: 13261281082@163.com

jobs:
  update-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv
          pip install requests
          pip install pyyaml

      - name: Update config with history parameters
        run: |
          # Use Python to update config.yaml with workflow inputs
          python3 << 'EOF'
          import yaml

          with open('config.yaml', 'r') as f:
              config = yaml.safe_load(f)

          # Update history parameters from workflow inputs
          config['history_date_from'] = "${{ github.event.inputs.history_date_from }}"
          config['history_date_to'] = "${{ github.event.inputs.history_date_to }}"
          config['min_citations'] = int("${{ github.event.inputs.min_citations }}")

          with open('config.yaml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)

          print("Config updated:")
          print(f"history_date_from: {config['history_date_from']}")
          print(f"history_date_to: {config['history_date_to']}")
          print(f"min_citations: {config['min_citations']}")
          EOF

      - name: Run history update
        run: |
          python daily_arxiv.py --update_history

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update history papers (${{ github.event.inputs.history_date_from }} to ${{ github.event.inputs.history_date_to }})"
          file_pattern: docs/compress-arxiv-history.json

      - name: Send to Feishu
        if: success()
        run: |
          python3 << 'EOF'
          import json
          import requests
          import os

          webhook_url = os.environ.get('FEISHU_WEBHOOK', '')
          if not webhook_url:
              print("FEISHU_WEBHOOK not set, skipping")
              exit(0)

          # Read history JSON
          with open('docs/compress-arxiv-history.json', 'r') as f:
              data = json.load(f)

          if not data:
              print("No data to send")
              exit(0)

          # Build message
          total_papers = sum(len(papers) for papers in data.values())
          date_range = "${{ github.event.inputs.history_date_from }} - ${{ github.event.inputs.history_date_to }}"

          # Build elements
          elements = []

          # Header
          elements.append({
              "tag": "div",
              "text": {"tag": "lark_md", "content": f"📚 **历史论文更新**  |  📅 {date_range}  |  📄 {total_papers} 篇"}
          })

          # Build table
          # Table header
          table_cells = [[
              {"tag": "div", "text": {"tag": "lark_md", "content": "**标题**"}},
              {"tag": "div", "text": {"tag": "lark_md", "content": "**作者**"}},
              {"tag": "div", "text": {"tag": "lark_md", "content": "**引用量**"}},
              {"tag": "div", "text": {"tag": "lark_md", "content": "**日期**"}}
          ]]

          # Group by topic and add papers to table
          for topic, papers in data.items():
              if not papers:
                  continue

              # Add topic header as a row spanning all columns
              table_cells.append([
                  {"tag": "div", "text": {"tag": "lark_md", "content": f"**🏷️ {topic}**"}},
                  {"tag": "div", "text": {"tag": "lark_md", "content": ""}},
                  {"tag": "div", "text": {"tag": "lark_md", "content": ""}},
                  {"tag": "div", "text": {"tag": "lark_md", "content": ""}}
              ])

              # Sort papers by citations
              sorted_papers = sorted(papers.items(), key=lambda x: x[1].get('citations', 0), reverse=True)

              for paper_id, info in sorted_papers:
                  title = info.get('title', '')
                  if len(title) > 50:
                      title = title[:50] + '...'
                  authors = info.get('first_author', '')
                  citations = info.get('citations', 0)
                  published = info.get('published', '')
                  url = info.get('url', '')

                  table_cells.append([
                      {"tag": "div", "text": {"tag": "lark_md", "content": f"[{title}]({url})"}},
                      {"tag": "div", "text": {"tag": "lark_md", "content": authors}},
                      {"tag": "div", "text": {"tag": "lark_md", "content": str(citations)}},
                      {"tag": "div", "text": {"tag": "lark_md", "content": published}}
                  ])

          # Add table to elements
          elements.append({
              "tag": "table",
              "columns": [
                  {"tag": "col", "width": "stretch"},
                  {"tag": "col", "width": "auto"},
                  {"tag": "col", "width": "auto"},
                  {"tag": "col", "width": "auto"}
              ],
              "cells": table_cells
          })

          # Send to Feishu
          payload = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {"title": {"content": "📄 历史论文更新"}, "template": "blue"},
                  "elements": elements
              }
          }

          response = requests.post(webhook_url, json=payload, timeout=30)
          print(f"Feishu response: {response.status_code}")
          print(response.text)
          EOF
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
