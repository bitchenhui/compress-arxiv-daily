# This is a basic workflow to help you get started with Actions

name: Run Compress Arxiv Daily

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  schedule:
    # Beijing time 00:00 every day (UTC 16:00)
    - cron: "0 16 * * *"

env:

  GITHUB_USER_NAME: bitchenhui
  GITHUB_USER_EMAIL: 13261281092@163.com


# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: update
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python Env
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv
          pip install requests
          pip install pyyaml

      - name: Update config with Feishu webhook
        run: |
          # Add Feishu webhook to config if secret exists
          if [ -n "${{ secrets.FEISHU_WEBHOOK }}" ]; then
            echo "feishu_webhook: ${{ secrets.FEISHU_WEBHOOK }}" >> config.yaml
          else
            echo "feishu_webhook: ''" >> config.yaml
          fi

      - name: Run daily arxiv
        run: |
          python daily_arxiv.py

      - name: Push new files
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Github Action Automatic Update Compress Arxiv Papers"
          files: README.md docs/compress-arxiv-daily.json docs/compress-arxiv-daily-web.json docs/index.md docs/compress-arxiv-daily-wechat.json docs/wechat.md docs/compress-arxiv-history.json
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
